<!DOCTYPE html>
<!-- ============================================================
     index.html ―― 最初に開かれる画面（今は接続確認専用）
     ============================================================
     このファイルの役割：
       - ブラウザに表示する「土台」となる HTML
       - 必要な JavaScript を正しい順番で読み込む
     読み込む順番が大事：
       1. supabase-js（CDN）… 接続に使う道具
       2. config.js        … 接続先の設定（URL・キー）
       3. app.js           … 上の2つを使って接続を確認する本体
     ============================================================ -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- スマホでも見やすくするためのおまじない（PC/スマホ両対応のため） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TriviaVerse</title>
    <!-- 見た目を整えるためのスタイルシート。 -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ============================================================
         共通ヘッダー（どの画面でも常に表示される領域）
         ============================================================
         ・アプリ名と一言説明
         ・状態メッセージ(#status)
         ・ログイン関連（未ログイン=ログインフォーム / ログイン中=ログイン情報）
         ============================================================ -->
    <header>
      <h1>TriviaVerse</h1>
      <p class="tagline">集めた知識を、いつでも引き出せる場所。</p>

      <!-- app.js がこの場所に結果メッセージを書き込みます。 -->
      <p id="status">確認中…</p>

      <!-- ログインフォーム：未ログインのときだけ表示する。
           普段は隠す前提なので hidden を付けておき、app.js が出し分ける。
           form を使うと Enter キーでも送信できて便利。 -->
      <form id="login-form" hidden>
        <h2>ログイン</h2>
        <div>
          <label for="email">メールアドレス</label><br />
          <!-- type="email" にすると形式チェックが少し効く。
               required で空のまま送信できないようにする。 -->
          <input type="email" id="email" required autocomplete="username" />
        </div>
        <div>
          <label for="password">パスワード</label><br />
          <!-- type="password" にすると入力が伏せ字(●●●)になる。 -->
          <input
            type="password"
            id="password"
            required
            autocomplete="current-password"
          />
        </div>
        <button type="submit">ログイン</button>
      </form>

      <!-- ログイン情報：ログインしているときだけ表示する。
           最初は hidden で隠しておき、ログイン後に app.js が表示する。 -->
      <div id="account" hidden>
        <p id="login-info"></p>
        <button type="button" id="logout-button">ログアウト</button>
      </div>
    </header>

    <!-- ============================================================
         画面1：ホーム画面（一覧）
         ============================================================
         ・「＋ 新規登録」ボタン（ログイン時だけ表示する想定で、今は hidden）
         ・検索／絞り込みエリア（誰でも使える）
         ・登録済みの知識の一覧
         ============================================================ -->
    <div id="view-home">
      <!-- 新規登録画面へ移動するためのボタン（ログイン時だけ表示する想定）。 -->
      <button type="button" id="new-button" hidden>＋ 新規登録</button>
      <!-- ランダム閲覧画面へ移動するボタン（未ログインでも使える）。 -->
      <button type="button" id="random-button">ランダムに見る</button>

      <!-- ----------------------------------------------------------
           検索・絞り込みエリア（ログインしていなくても使える）
           ・キーワード検索：title / ai_explanation / my_summary を部分一致
           ・タグ絞り込み：使われているタグのボタンを押して絞り込む
           ・両方指定したときは AND（両方を満たすものだけ）
           ・クリアで全件表示に戻す
           ---------------------------------------------------------- -->
      <hr />
      <h2>検索・絞り込み</h2>
      <div>
        <!-- キーワード検索の入力欄と実行ボタン。 -->
        <label for="search-input">キーワード</label>
        <input type="text" id="search-input" placeholder="探したい言葉" />
        <button type="button" id="search-button">検索</button>
        <!-- 条件をすべて消して全件表示に戻すボタン。 -->
        <button type="button" id="reset-button">クリア（全件表示）</button>
      </div>
      <div>
        <!-- いま選んでいる絞り込み条件の表示（例：タグ「歴史」で絞り込み中）。 -->
        <p id="filter-status"></p>
        <!-- 使われているタグのボタンを app.js がここへ並べる。 -->
        <p>タグで絞り込み：</p>
        <div id="tag-list"></div>
      </div>

      <!-- ----------------------------------------------------------
           登録済みの知識の一覧（誰でも閲覧できる）
           ページを開いたとき・登録/更新/削除のとき・検索のときに、
           app.js がここへ一覧を書き込みます。
           ---------------------------------------------------------- -->
      <hr />
      <h2>登録済みの知識</h2>
      <!-- 今週分／全件 の表示を切り替えるボタン。app.js がラベルを切り替える。 -->
      <button type="button" id="show-all-button">すべて見る</button>
      <!-- 登録件数の表示。app.js が「全○件」などを書き込む。 -->
      <p id="count-status"></p>
      <div id="knowledge-list">読み込み中…</div>
    </div>

    <!-- ============================================================
         画面2：詳細画面
         ============================================================
         1件の知識をじっくり表示する画面。最初は hidden で隠しておく。
         ・一覧に戻るボタン
         ・詳細の中身を入れる空エリア(#detail-content)（app.js が書き込む）
         ・編集／削除ボタン（ログイン時だけ使う想定）
         ============================================================ -->
    <div id="view-detail" hidden>
      <!-- 一覧（ホーム画面）へ戻るボタン。 -->
      <button type="button" id="detail-back-button">← 一覧に戻る</button>

      <!-- 知識の詳細をここに表示する（今は空。app.js が中身を入れる）。 -->
      <div id="detail-content"></div>

      <!-- ログイン時だけ使う編集・削除ボタン。 -->
      <button type="button" id="detail-edit-button">編集</button>
      <button type="button" id="detail-delete-button">削除</button>
    </div>

    <!-- ============================================================
         画面3：登録／編集画面
         ============================================================
         知識を新規登録・編集するフォーム。最初は hidden で隠しておく。
         入力項目は knowledge テーブルの列に合わせている：
           title          … タイトル（必須）
           ai_explanation … AIの説明（任意）
           my_summary     … 自分のまとめ（任意）
           source         … 出典（任意）
           tags           … タグ（任意・カンマ区切りで複数）
         ※ ai_explanation と my_summary は「どちらか一方は必須」。
         ============================================================ -->
    <div id="view-edit" hidden>
      <form id="knowledge-form">
        <!-- フォームの見出し。新規登録 / 編集 でテキストを切り替える。 -->
        <h2 id="form-title">知識を登録</h2>

        <div>
          <label for="title">タイトル（必須）</label><br />
          <input type="text" id="title" required />
        </div>

        <div>
          <label for="ai_explanation">AIの説明（任意）</label><br />
          <!-- 長文を貼り付けるので textarea（複数行入力欄）にする。 -->
          <textarea id="ai_explanation" rows="6"></textarea>
        </div>

        <div>
          <label for="my_summary">自分のまとめ（任意）</label><br />
          <textarea id="my_summary" rows="6"></textarea>
        </div>

        <div>
          <label for="source">出典（任意・URLや書名）</label><br />
          <input type="text" id="source" />
        </div>

        <div>
          <label for="tags">タグ（任意・カンマ区切りで複数可）</label><br />
          <!-- 例: 歴史, 科学, メモ  のように入力する。 -->
          <input type="text" id="tags" placeholder="例: 歴史, 科学" />
        </div>

        <div>
          <label for="image">画像（任意）</label><br />
          <!-- accept="image/*" で画像ファイルだけ選べるようにする。 -->
          <input type="file" id="image" accept="image/*" />
          <!-- 編集時、いまの画像のプレビュー。新規や画像なしのときは hidden。
               app.js（enterEditMode）が src と表示／非表示を切り替える。 -->
          <div id="current-image-box" hidden>
            <img id="current-image-preview" class="detail-image" alt="現在の画像" />
            <label>
              <!-- オンにすると保存時に既存画像を削除（image_url を null に）。 -->
              <input type="checkbox" id="remove-image" />
              画像を削除する
            </label>
          </div>
        </div>

        <!-- 送信ボタン。新規=「登録する」/ 編集=「更新する」に切り替える。 -->
        <button type="submit" id="submit-button">登録する</button>
        <!-- 編集をやめるためのキャンセルボタン。
             新規登録モードでは不要なので、最初は hidden で隠しておく。 -->
        <button type="button" id="cancel-button" hidden>キャンセル</button>
      </form>
    </div>

    <!-- ============================================================
         画面4：ランダム閲覧画面
         ============================================================
         登録済みの知識からランダムに最大10件を「タイトルのみ」で表示する。
         最初は hidden で隠しておく。未ログインでも使える。
         ・一覧に戻るボタン
         ・「次のランダム」で別の最大10件に引き直し
         ・タイトルクリックで詳細画面へ
         ============================================================ -->
    <div id="view-random" hidden>
      <button type="button" id="random-back-button">← 一覧に戻る</button>
      <button type="button" id="random-shuffle-button">次のランダム</button>
      <h2>ランダムに見る</h2>
      <!-- ランダムに選んだ知識のタイトルを app.js がここへ並べる。 -->
      <div id="random-list"></div>
    </div>

    <!-- 1) supabase-js を CDN から読み込む（@2 は最新の安定版） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2) 接続設定。app.js より前に読み込む必要がある。 -->
    <script src="config.js"></script>

    <!-- 3) アプリ本体（接続確認）。最後に読み込む。 -->
    <script src="app.js"></script>
  </body>
</html>
